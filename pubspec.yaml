name: otakulog
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  dio: ^5.9.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  fl_chart: ^1.1.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  local_auth: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  graphql_flutter: ^5.2.1
  share_plus: ^12.0.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/

flutter_launcher_icons:
  android: true
  image_path: assets/branding/otakulog_icon.png
  adaptive_icon_background: "#0C0C10"
  adaptive_icon_foreground: assets/branding/otakulog_icon.png

flutter_native_splash:
  color: "#0C0C10"
  image: assets/branding/otakulog_icon.png
  android_12:
    color: "#0C0C10"
    image: assets/branding/otakulog_icon.png
